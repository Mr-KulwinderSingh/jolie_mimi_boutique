<script type="text/javascript">


    // Disable +/- buttons outside 1 to max available stock range
    function handleEnableDisable(itemId) {

    var currentValue = parseInt($('#id_qty_' + itemId).val());
    var minValue = parseInt($('#id_qty_' + itemId).attr('min'));
    var maxValue = parseInt($('#id_qty_' + itemId).attr('max'));

    var decrementDisabled = currentValue <= minValue;
    var incrementDisabled = currentValue >= maxValue;

    $('#decrement-qty_' + itemId).prop('disabled', decrementDisabled);
    $('#increment-qty_' + itemId).prop('disabled', incrementDisabled);
}
    // Increment quantity
   $('.increment-qty').click(function(e) {
    e.preventDefault();

    var itemId = $(this).data('item_id');
    var quantityInput = $(this).closest('.input-group').find('.qty_input');

    var currentValue = parseInt(quantityInput.val());
    var maxValue = parseInt(quantityInput.attr('max'));

    if (currentValue < maxValue) {
        quantityInput.val(currentValue + 1);
    }

    handleEnableDisable(itemId);
});

    // Decrement quantity
    $('.decrement-qty').click(function(e) {
    e.preventDefault();

    var itemId = $(this).data('item_id');
    var quantityInput = $(this).closest('.input-group').find('.qty_input');

    var currentValue = parseInt(quantityInput.val());
    var minValue = parseInt(quantityInput.attr('min'));

    if (currentValue > minValue) {
        quantityInput.val(currentValue - 1);
    }

    handleEnableDisable(itemId);
});

     // Check enable/disable every time the input is changed
    $('.qty_input').each(function() {
    var itemId = $(this).data('item_id');
    handleEnableDisable(itemId);
});

</script>
